name: Update snow data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated data.json
        run: |
          git config user.name "snow-watch-bot"
          git config user.email "snow-watch-bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update snow data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
